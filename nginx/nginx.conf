events {
    worker_connections 1024;
}

http {
    upstream auth          { server auth-service:3001; }
    upstream raw_materials { server raw-materials-service:3002; }
    upstream products      { server products-service:3003; }
    upstream productions   { server productions-service:3004; }
    upstream orders        { server orders-service:3005; }
    upstream frontend      { server frontend:4200; }

    server {
        listen 80;

        location /api/raw-materials/ {
            proxy_pass http://raw_materials/raw_materials/;
        }

        location = /api/raw-materials {
            proxy_pass http://raw_materials/raw_materials;
        }
        location /api/orders/ {
            proxy_pass http://orders/orders/;
        }
        location = /api/orders {
            proxy_pass http://orders/orders;
        }
        location /api/auth/ {
            proxy_pass http://auth/;
        }
        location = /api/auth {
            proxy_pass http://auth;
        }
        location /api/productions/ {
            proxy_pass http://productions/batches/;
        }
        location = /api/productions {
            proxy_pass http://productions/batches;
        }
        location /api/products/ {
            proxy_pass http://products/products/;
        }
        location = /api/products {
            proxy_pass http://products/products;
        }

        location /health/auth        { proxy_pass http://auth/health;         }
        location /health/materials   { proxy_pass http://raw_materials/health; }
        location /health/products    { proxy_pass http://products/health;      }
        location /health/productions { proxy_pass http://productions/health;   }
        location /health/orders      { proxy_pass http://orders/health;        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
        }
    }
}