version: "3.9"

services:
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL: postgres://auth:auth@auth-db:5432/auth_db
      JWT_SECRET: super_secret_key
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      - auth-db

volumes:
  auth_db_data: